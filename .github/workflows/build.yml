name: Build multi-platform

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build
        run: python build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoFrameExtractor-windows
          path: dist/VideoFrameExtractor.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build
        run: python build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoFrameExtractor-linux
          path: dist/VideoFrameExtractor

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build
        run: python build.py
      - name: Create DMG
        run: |
          TMPDIR=$(mktemp -d)
          cp -R dist/VideoFrameExtractor.app "$TMPDIR/"
          ln -s /Applications "$TMPDIR/Applications"
          hdiutil create -volname "VideoFrameExtractor" -srcfolder "$TMPDIR" -ov -format UDZO "dist/VideoFrameExtractor.dmg"
          rm -rf "$TMPDIR"

      - name: Upload artifact (.app)
        uses: actions/upload-artifact@v4
        with:
          name: VideoFrameExtractor-macos-app
          path: dist/VideoFrameExtractor.app

      - name: Upload artifact (dmg)
        uses: actions/upload-artifact@v4
        with:
          name: VideoFrameExtractor-macos-dmg
          path: dist/VideoFrameExtractor.dmg
